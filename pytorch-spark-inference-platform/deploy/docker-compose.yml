# Development mode — source code mounted, edit and re-run without rebuild
services:
  inference:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: multi-model-inference
    runtime: nvidia
    volumes:
      - ..:/app
      - ../results:/app/results
    ports:
      - "4040:4040"
      - "8080:8080"
    environment:
      - PYSPARK_PYTHON=python
      - PYSPARK_DRIVER_PYTHON=python
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    shm_size: '4g'
    command: python benchmark/run_benchmark.py --mode all
