# =============================================================================
# Spark Inference Cluster — Linux (EC2 / bare-metal)
# =============================================================================
# Uses network_mode: host for direct IP communication (no port mapping needed)
# Workers use runtime: nvidia for GPU access
#
# Usage:
#   docker compose -f deploy/docker-compose.cluster.linux.yml up
#
# Scale workers:
#   docker compose -f deploy/docker-compose.cluster.linux.yml up --scale spark-cpu-worker=3 --scale spark-gpu-worker=2
#
# Run benchmarks:
#   MASTER_IP=$(hostname -I | awk '{print $1}')
#   docker exec -it spark-master bash -c "SPARK_MASTER_URL=spark://$MASTER_IP:7077 python benchmark/cluster_benchmark.py --device-mode cpu_only --partitions 4 --signal-samples 5000"
#   docker exec -it spark-master bash -c "SPARK_MASTER_URL=spark://$MASTER_IP:7077 python benchmark/cluster_benchmark.py --device-mode gpu_only --partitions 2 --signal-samples 1000"
#   docker exec -it spark-master bash -c "SPARK_MASTER_URL=spark://$MASTER_IP:7077 python benchmark/cluster_benchmark.py --device-mode hybrid --partitions 4 --signal-samples 5000"
#   docker exec -it spark-master bash -c "SPARK_MASTER_URL=spark://$MASTER_IP:7077 python benchmark/cluster_benchmark.py --incremental"
#
# Cleanup:
#   docker compose -f deploy/docker-compose.cluster.linux.yml down
# =============================================================================

services:
  spark-master:
    image: multi-model-inference:latest
    container_name: spark-master
    network_mode: host
    environment:
      - SPARK_MODE=master
    command: >
      bash -c "
        $$SPARK_HOME/sbin/start-master.sh &&
        tail -f $$SPARK_HOME/logs/*master*
      "
    # Ports exposed via host network: 7077 (RPC), 8080 (Master UI), 4040 (App UI)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- CPU Workers (scale with --scale spark-cpu-worker=N) ---
  spark-cpu-worker:
    image: multi-model-inference:latest
    network_mode: host
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER=spark://localhost:7077
    command: >
      bash -c "
        sleep 5 &&
        $$SPARK_HOME/sbin/start-worker.sh spark://localhost:7077 -c 2 -m 4g &&
        tail -f $$SPARK_HOME/logs/*worker*
      "
    deploy:
      replicas: 2
    depends_on:
      spark-master:
        condition: service_healthy

  # --- GPU Workers (scale with --scale spark-gpu-worker=N) ---
  spark-gpu-worker:
    image: multi-model-inference:latest
    network_mode: host
    runtime: nvidia
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER=spark://localhost:7077
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    shm_size: '4g'
    command: >
      bash -c "
        sleep 5 &&
        $$SPARK_HOME/sbin/start-worker.sh spark://localhost:7077 -c 4 -m 12g &&
        tail -f $$SPARK_HOME/logs/*worker*
      "
    deploy:
      replicas: 1
    depends_on:
      spark-master:
        condition: service_healthy
