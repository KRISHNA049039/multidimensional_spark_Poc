# Cluster mode — multi-node Spark with GPU workers
# Usage: docker compose -f deploy/docker-compose.cluster.yml up
services:
  spark-master:
    image: multi-model-inference:latest
    container_name: spark-master
    network_mode: host
    environment:
      - SPARK_MODE=master
    command: >
      bash -c "
        $$SPARK_HOME/sbin/start-master.sh &&
        tail -f $$SPARK_HOME/logs/*master*
      "
    ports:
      - "7077:7077"
      - "8080:8080"
      - "4040:4040"

  spark-worker:
    image: multi-model-inference:latest
    runtime: nvidia
    network_mode: host
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER=spark://localhost:7077
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - SPARK_EXECUTOR_GPU=1
    shm_size: '4g'
    command: >
      bash -c "
        $$SPARK_HOME/sbin/start-worker.sh spark://localhost:7077 -c 4 -m 8g &&
        tail -f $$SPARK_HOME/logs/*worker*
      "
    deploy:
      replicas: 2
    depends_on:
      - spark-master
