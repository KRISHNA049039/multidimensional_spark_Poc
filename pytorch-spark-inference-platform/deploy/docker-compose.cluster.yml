# =============================================================================
# Spark Inference Cluster — Windows Docker Desktop
# =============================================================================
# Supports 3 device modes: cpu_only, gpu_only, hybrid
# Workers connect to master by service name (Docker bridge network)
#
# Usage:
#   docker compose -f deploy/docker-compose.cluster.yml up
#
# Scale workers:
#   docker compose -f deploy/docker-compose.cluster.yml up --scale spark-cpu-worker=3 --scale spark-gpu-worker=2
#
# Run benchmarks (from another terminal):
#   docker exec -it spark-master bash -c "SPARK_MASTER_URL=spark://spark-master:7077 CUDA_VISIBLE_DEVICES='' python benchmark/run_benchmark.py --mode distributed --signal-samples 10000 --partitions 4"
#
# Results are written to ./results/ on your host (volume mounted)
#
# Cleanup:
#   docker compose -f deploy/docker-compose.cluster.yml down
# =============================================================================

services:
  spark-master:
    image: multi-model-inference:latest
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - CUDA_VISIBLE_DEVICES=
      - SPARK_DRIVER_MEMORY=8g
    volumes:
      - ../results:/app/results
      - ../benchmark:/app/benchmark
      - ../inference:/app/inference
      - ../models:/app/models
      - ../data:/app/data
    command: >
      bash -c "
        $$SPARK_HOME/sbin/start-master.sh -h spark-master &&
        tail -f $$SPARK_HOME/logs/*master*
      "
    ports:
      - "7077:7077"
      - "8080:8080"
      - "4040:4040"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- CPU Workers (scale with --scale spark-cpu-worker=N) ---
  spark-cpu-worker:
    image: multi-model-inference:latest
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER=spark://spark-master:7077
      - CUDA_VISIBLE_DEVICES=
    volumes:
      - ../results:/app/results
      - ../benchmark:/app/benchmark
      - ../inference:/app/inference
      - ../models:/app/models
      - ../data:/app/data
    command: >
      bash -c "
        sleep 5 &&
        $$SPARK_HOME/sbin/start-worker.sh spark://spark-master:7077 -c 2 -m 4g &&
        tail -f $$SPARK_HOME/logs/*worker*
      "
    deploy:
      replicas: 2
    depends_on:
      spark-master:
        condition: service_healthy

  # --- GPU Workers ---
  # NOTE: GPU disabled until image is rebuilt with PyTorch 2.6+ (sm_120 support)
  # After rebuild: remove CUDA_VISIBLE_DEVICES and uncomment deploy.resources
  spark-gpu-worker:
    image: multi-model-inference:latest
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER=spark://spark-master:7077
      - CUDA_VISIBLE_DEVICES=
    shm_size: '4g'
    volumes:
      - ../results:/app/results
      - ../benchmark:/app/benchmark
      - ../inference:/app/inference
      - ../models:/app/models
      - ../data:/app/data
    command: >
      bash -c "
        sleep 5 &&
        $$SPARK_HOME/sbin/start-worker.sh spark://spark-master:7077 -c 4 -m 8g &&
        tail -f $$SPARK_HOME/logs/*worker*
      "
    deploy:
      replicas: 1
    depends_on:
      spark-master:
        condition: service_healthy
