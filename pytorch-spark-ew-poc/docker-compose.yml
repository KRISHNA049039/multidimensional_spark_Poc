services:
  benchmark:
    build: .
    container_name: ew-pytorch-spark-poc
    runtime: nvidia
    volumes:
      # Mount source code — edit on Windows, runs instantly in container
      - D:\pyspark_torch_poc_dist\pytorch-spark-ew-poc:/pyspark_poc
      # Results output
      - ./results:/pyspark_poc/results
    ports:
      - "4040:4040"
      - "4041:4041"
      - "8080:8080"
    environment:
      - PYSPARK_PYTHON=python
      - PYSPARK_DRIVER_PYTHON=python
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - SPARK_DRIVER_MEMORY=2g
    shm_size: '2g'
    command: python benchmark/run_benchmark.py
